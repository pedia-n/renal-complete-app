<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テスト - 腎機能評価アプリ</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      max-width: 600px;
      width: 100%;
    }
    h1 {
      color: #667eea;
      margin-top: 0;
    }
    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 16px;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 20px;
      width: 100%;
    }
    button:hover {
      opacity: 0.9;
    }
    .success {
      color: #10b981;
      font-weight: bold;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✅ GitHub Pages 動作確認</h1>
    <p>このページが表示されていれば、GitHub Pagesは正常に動作しています！</p>
    <button onclick="showMessage()">動作テスト</button>
    <div id="result"></div>
  </div>

  <script>
    function showMessage() {
      document.getElementById('result').innerHTML = '<div class="success">✅ JavaScriptも正常に動作しています！</div>';
    }
    
    // ページ読み込み完了の確認
    console.log('ページが読み込まれました');
    console.log('現在のURL:', window.location.href);
  </script>
</body>
</html>
